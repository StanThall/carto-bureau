services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carto
      POSTGRES_USER: carto
      POSTGRES_PASSWORD: carto
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://carto:carto@postgres:5432/carto
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
